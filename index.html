<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI×I</title>
 <link rel="manifest" href="manifest-v2.json">

<meta name="theme-color" content="#4f46e5">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="icon_new-192.png">
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --sub: #6b7280;
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --ok: #059669;
      --warn: #b45309;
      --danger: #dc2626;
      --assistant: #eef2ff;
      --user: #f9fafb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      padding: 16px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 8px 0 4px;
      font-size: 34px;
    }

    .subtitle {
      color: var(--sub);
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.03);
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 12px;
    }

    .label {
      display: block;
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 6px;
      font-weight: 700;
    }

    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      padding: 12px 13px;
      margin-bottom: 10px;
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.65;
    }

    input:focus, select:focus, textarea:focus {
      outline: 2px solid rgba(79, 70, 229, 0.18);
      border-color: var(--primary);
    }

    button {
      background: var(--primary);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.05s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:hover { background: var(--primary-dark); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .secondary-btn {
      background: #eef2ff;
      color: var(--primary-dark);
      border: 1px solid #c7d2fe;
    }

    .secondary-btn:hover {
      background: #e0e7ff;
    }

    .danger-btn {
      background: #fff1f2;
      color: var(--danger);
      border: 1px solid #fecdd3;
    }

    .danger-btn:hover {
      background: #ffe4e6;
    }

    .ghost-btn {
      background: #f9fafb;
      color: #374151;
      border: 1px solid #e5e7eb;
    }

    .ghost-btn:hover {
      background: #f3f4f6;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .button-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .chat-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fcfcfd;
      min-height: 280px;
      max-height: 560px;
      overflow-y: auto;
      padding: 12px;
    }

    .bubble {
      padding: 12px 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.assistant {
      background: var(--assistant);
      border-top-left-radius: 6px;
    }

    .bubble.user {
      background: var(--user);
      border: 1px solid var(--line);
      border-top-right-radius: 6px;
    }

    .bubble-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .message {
      font-size: 14px;
      color: var(--sub);
      white-space: pre-wrap;
      min-height: 22px;
    }

    .small {
      font-size: 13px;
      color: var(--sub);
    }

    .result-block {
      border: 1px solid var(--line);
      background: #fafafa;
      border-radius: 14px;
      padding: 12px;
      min-height: 76px;
      white-space: pre-wrap;
      line-height: 1.75;
    }

    .score-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .score-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fafafa;
      text-align: center;
    }

    .score-item .num {
      font-size: 26px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-top: 4px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: var(--primary-dark);
      font-size: 13px;
      border: 1px solid #c7d2fe;
    }

    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #374151;
      background: #fafafa;
      border: 1px solid var(--line);
      padding: 10px 12px;
      border-radius: 12px;
    }

    .toggle input {
      width: auto;
      margin: 0;
      accent-color: var(--primary);
    }

    .progress-wrap {
      margin-top: 6px;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4f46e5, #818cf8);
      transition: width 0.25s ease;
    }

    .footer-note {
      text-align: center;
      color: var(--sub);
      font-size: 12px;
      margin-top: 8px;
    }

    @media (max-width: 860px) {
      .grid, .row, .row-3, .button-row, .button-row-3, .score-board {
        grid-template-columns: 1fr;
      }

      body {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>AI×I</h1>
    <div class="subtitle">対話型・音声対応・成長が見える英会話アプリ</div>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="section-title">設定</div>

        <label class="label">パスコード</label>
        <input id="passcodeInput" type="password" placeholder="配布されたパスコードを入力" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">

        <div class="row">
          <div>
            <label class="label">シナリオ</label>
            <select id="scenarioSelect">
              <option value="free">自由テーマ</option>
              <option value="restaurant">レストラン</option>
              <option value="travel">旅行</option>
              <option value="hotel">ホテル</option>
              <option value="airport">空港</option>
              <option value="school">学校</option>
              <option value="shopping">買い物</option>
              <option value="baseball">野球</option>
              <option value="hospital">病院</option>
              <option value="job_interview">面接</option>
            </select>
          </div>
          <div>
            <label class="label">会話の形</label>
            <select id="roleModeSelect">
              <option value="ai_asks" selected>AIが質問して私が答える</option>
              <option value="user_asks">私が質問してAIが答える</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label class="label">英語レベル</label>
            <select id="levelSelect">
              <option value="Oxford1000">Oxford1000</option>
              <option value="Oxford2000" selected>Oxford2000</option>
              <option value="Oxford3000">Oxford3000</option>
            </select>
          </div>
          <div>
            <label class="label">音声</label>
            <select id="voiceSelect">
              <option value="auto">自動</option>
            </select>
          </div>
        </div>

        <label class="label">テーマ</label>
        <input id="topicInput" type="text" placeholder="例：baseball / ordering food / school festival" value="baseball">

        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="autoSpeakCheck" checked> AIの返答を自動で読む</label>
          <label class="toggle"><input type="checkbox" id="saveHistoryCheck" checked> ブラウザに会話を保存</label>
        </div>

        <div class="button-row">
          <button id="startBtn">会話を始める</button>
          <button id="continueBtn" class="secondary-btn">前回の続き</button>
        </div>

        <div class="button-row-3">
          <button id="nextBtn" class="ghost-btn" disabled>次のシーンへ</button>
          <button id="summaryBtn" class="ghost-btn" disabled>今日はここまで</button>
          <button id="resetBtn" class="danger-btn">会話をリセット</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        </div>
        <div id="startMessage" class="message"></div>
      </div>

      <div class="card">
        <div class="section-title">会話</div>
        <div id="chatBox" class="chat-box">ここに会話が表示されます。</div>
      </div>

      <div class="card">
        <div class="section-title">あなたの入力</div>
        <textarea id="userMessageInput" placeholder="ここに英語を書いて送信します。マイク入力も使えます。"></textarea>

        <div class="button-row-3">
          <button id="sendBtn" disabled>送信する</button>
          <button id="micBtn" class="secondary-btn">🎤 マイク入力</button>
          <button id="readUserBtn" class="ghost-btn">🔊 自分の文を読む</button>
        </div>

        <div class="small">Enterで送信 / Shift+Enterで改行</div>
        <div id="sendMessageText" class="message"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="section-title">今回の評価</div>
        <div class="score-board">
          <div class="score-item">
            <div class="small">Score</div>
            <div id="scoreText" class="num">--</div>
          </div>
          <div class="score-item">
            <div class="small">CEFR</div>
            <div id="cefrText" class="num">--</div>
          </div>
          <div class="score-item">
            <div class="small">Streak</div>
            <div id="streakText" class="num">0</div>
          </div>
        </div>

        <div class="small">先生コメント</div>
        <div id="coachComment" class="result-block">ここに表示されます。</div>

        <div class="small" style="margin-top:10px;">学習ポイント</div>
        <div id="focusPoints" class="pill-row">
          <span class="pill">ここに表示されます。</span>
        </div>
      </div>

      <div class="card">
        <div class="section-title">もっと自然な英語</div>
        <div id="betterText" class="result-block">ここに表示されます。</div>
        <div class="button-row" style="margin-top:10px;">
          <button id="readBetterBtn" class="ghost-btn">🔊 読む</button>
          <button id="copyBetterBtn" class="ghost-btn">コピー</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">別の言い方</div>
        <div id="alternativeText" class="result-block">ここに表示されます。</div>
        <div class="button-row" style="margin-top:10px;">
          <button id="readAltBtn" class="ghost-btn">🔊 読む</button>
          <button id="copyAltBtn" class="ghost-btn">コピー</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">日本語訳</div>
        <div id="translationText" class="result-block">ここに表示されます。</div>
      </div>

      <div class="card">
        <div class="section-title">理由（日本語）</div>
        <div id="reasonText" class="result-block">ここに表示されます。</div>
      </div>

      <div class="card">
        <div class="section-title">今日のまとめ</div>
        <div id="summaryText" class="result-block">まだありません。</div>
      </div>
    </div>
  </div>

  <div class="footer-note">PWA対応 / 音声対応 / 会話保存対応</div>
</div>

<script>
  const API_URL = "https://ai-i-worker.gudafutanu.workers.dev";
  const STORAGE_KEY = "aixi_session_v2";

  const SCENARIOS = {
    free: "",
    restaurant: "ordering food at a restaurant",
    travel: "talking during travel",
    hotel: "checking in at a hotel",
    airport: "speaking at the airport",
    school: "talking about school life",
    shopping: "shopping at a store",
    baseball: "talking about baseball",
    hospital: "talking at a hospital",
    job_interview: "job interview practice"
  };

  let conversationHistory = [];
  let conversationStarted = false;
  let isLoading = false;
  let recognition = null;
  let recognizing = false;
  let lastAssistantText = "";
  let sessionStats = { streak: 0, turnCount: 0 };

  const passcodeInput = document.getElementById("passcodeInput");
  const scenarioSelect = document.getElementById("scenarioSelect");
  const topicInput = document.getElementById("topicInput");
  const roleModeSelect = document.getElementById("roleModeSelect");
  const levelSelect = document.getElementById("levelSelect");
  const voiceSelect = document.getElementById("voiceSelect");
  const autoSpeakCheck = document.getElementById("autoSpeakCheck");
  const saveHistoryCheck = document.getElementById("saveHistoryCheck");
  const startBtn = document.getElementById("startBtn");
  const continueBtn = document.getElementById("continueBtn");
  const nextBtn = document.getElementById("nextBtn");
  const summaryBtn = document.getElementById("summaryBtn");
  const resetBtn = document.getElementById("resetBtn");
  const sendBtn = document.getElementById("sendBtn");
  const micBtn = document.getElementById("micBtn");
  const readUserBtn = document.getElementById("readUserBtn");
  const readBetterBtn = document.getElementById("readBetterBtn");
  const readAltBtn = document.getElementById("readAltBtn");
  const copyBetterBtn = document.getElementById("copyBetterBtn");
  const copyAltBtn = document.getElementById("copyAltBtn");
  const startMessage = document.getElementById("startMessage");
  const sendMessageText = document.getElementById("sendMessageText");
  const userMessageInput = document.getElementById("userMessageInput");
  const chatBox = document.getElementById("chatBox");
  const betterText = document.getElementById("betterText");
  const alternativeText = document.getElementById("alternativeText");
  const translationText = document.getElementById("translationText");
  const reasonText = document.getElementById("reasonText");
  const coachComment = document.getElementById("coachComment");
  const focusPoints = document.getElementById("focusPoints");
  const scoreText = document.getElementById("scoreText");
  const cefrText = document.getElementById("cefrText");
  const streakText = document.getElementById("streakText");
  const summaryText = document.getElementById("summaryText");
  const progressFill = document.getElementById("progressFill");

  function escapeHtml(text) {
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function applyScenario() {
    const val = scenarioSelect.value;
    if (val !== "free") {
      topicInput.value = SCENARIOS[val] || "";
    }
  }

  async function postApi(payload) {
    const passcode = passcodeInput.value.trim();
    if (!passcode) throw new Error("パスコードを入力してください");

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...payload, passcode })
    });

    let data = {};
    try {
      data = await res.json();
    } catch {
      throw new Error("サーバーから正しいJSONが返りませんでした。");
    }

    if (!res.ok) {
      throw new Error(data.detail || data.error || "通信エラーです");
    }

    return data;
  }

  function renderChat() {
    if (!conversationHistory.length) {
      chatBox.textContent = "ここに会話が表示されます。";
      return;
    }

    chatBox.innerHTML = conversationHistory.map(item => {
      const roleClass = item.role === "assistant" ? "assistant" : "user";
      const label = item.role === "assistant" ? "AI" : "You";
      return `
        <div class="bubble ${roleClass}">
          <div class="bubble-label">${label}</div>
          <div>${escapeHtml(item.content)}</div>
        </div>
      `;
    }).join("");

    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function setFocusPoints(items) {
    if (!Array.isArray(items) || !items.length) {
      focusPoints.innerHTML = '<span class="pill">ここに表示されます。</span>';
      return;
    }

    focusPoints.innerHTML = items
      .slice(0, 6)
      .map(item => `<span class="pill">${escapeHtml(item)}</span>`)
      .join("");
  }

  function clearFeedback() {
    betterText.textContent = "ここに表示されます。";
    alternativeText.textContent = "ここに表示されます。";
    translationText.textContent = "ここに表示されます。";
    reasonText.textContent = "ここに表示されます。";
    coachComment.textContent = "ここに表示されます。";
    scoreText.textContent = "--";
    cefrText.textContent = "--";
    setFocusPoints([]);
  }

  function setLoading(loading) {
    isLoading = loading;
    startBtn.disabled = loading;
    continueBtn.disabled = loading;
    nextBtn.disabled = loading || !conversationStarted;
    summaryBtn.disabled = loading || !conversationStarted;
    sendBtn.disabled = loading || !conversationStarted;
    micBtn.disabled = loading;
  }

  function updateProgress() {
    const width = Math.min(sessionStats.turnCount * 12, 100);
    progressFill.style.width = width + "%";
    streakText.textContent = String(sessionStats.streak || 0);
  }

  function saveSession() {
    if (!saveHistoryCheck.checked) return;
    const payload = {
      passcode: passcodeInput.value,
      scenario: scenarioSelect.value,
      topic: topicInput.value,
      roleMode: roleModeSelect.value,
      level: levelSelect.value,
      conversationHistory,
      conversationStarted,
      sessionStats,
      better: betterText.textContent,
      alternative: alternativeText.textContent,
      translation: translationText.textContent,
      reason: reasonText.textContent,
      coachComment: coachComment.textContent,
      score: scoreText.textContent,
      cefr: cefrText.textContent,
      summary: summaryText.textContent,
      focusPills: Array.from(focusPoints.querySelectorAll('.pill')).map(el => el.textContent)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }

  function loadSession() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      passcodeInput.value = data.passcode || "";
      scenarioSelect.value = data.scenario || "free";
      topicInput.value = data.topic || "";
      roleModeSelect.value = data.roleMode || "ai_asks";
      levelSelect.value = data.level || "Oxford2000";
      conversationHistory = Array.isArray(data.conversationHistory) ? data.conversationHistory : [];
      conversationStarted = !!data.conversationStarted && conversationHistory.length > 0;
      sessionStats = data.sessionStats || { streak: 0, turnCount: 0 };
      renderChat();
      betterText.textContent = data.better || "ここに表示されます。";
      alternativeText.textContent = data.alternative || "ここに表示されます。";
      translationText.textContent = data.translation || "ここに表示されます。";
      reasonText.textContent = data.reason || "ここに表示されます。";
      coachComment.textContent = data.coachComment || "ここに表示されます。";
      scoreText.textContent = data.score || "--";
      cefrText.textContent = data.cefr || "--";
      summaryText.textContent = data.summary || "まだありません。";
      setFocusPoints(Array.isArray(data.focusPills) ? data.focusPills : []);
      lastAssistantText = getLastAssistantText();
      updateProgress();
      sendBtn.disabled = !conversationStarted;
      nextBtn.disabled = !conversationStarted;
      summaryBtn.disabled = !conversationStarted;
      return conversationStarted;
    } catch {
      return false;
    }
  }

  function resetSession() {
    conversationHistory = [];
    conversationStarted = false;
    sessionStats = { streak: 0, turnCount: 0 };
    lastAssistantText = "";
    userMessageInput.value = "";
    startMessage.textContent = "";
    sendMessageText.textContent = "";
    summaryText.textContent = "まだありません。";
    renderChat();
    clearFeedback();
    updateProgress();
    sendBtn.disabled = true;
    nextBtn.disabled = true;
    summaryBtn.disabled = true;
    localStorage.removeItem(STORAGE_KEY);
  }

  function getLastAssistantText() {
    const reversed = [...conversationHistory].reverse();
    const found = reversed.find(item => item.role === "assistant");
    return found ? found.content : "";
  }

  async function speakText(text) {
    const value = String(text || "").trim();
    if (!value) return;

    if (!("speechSynthesis" in window)) {
      alert("このブラウザは音声読み上げに対応していません。");
      return;
    }

    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(value);
    utter.lang = "en-US";
    utter.rate = 0.95;
    utter.pitch = 1.0;

    const selectedName = voiceSelect.value;
    const voices = window.speechSynthesis.getVoices();
    let voice = null;

    if (selectedName && selectedName !== "auto") {
      voice = voices.find(v => v.name === selectedName) || null;
    }
    if (!voice) {
      voice = voices.find(v => /^en(-|_)/i.test(v.lang)) || null;
    }
    if (voice) utter.voice = voice;

    window.speechSynthesis.speak(utter);
  }

  function populateVoices() {
    if (!("speechSynthesis" in window)) return;
    const voices = window.speechSynthesis.getVoices().filter(v => /^en(-|_)/i.test(v.lang));
    const current = voiceSelect.value;
    voiceSelect.innerHTML = '<option value="auto">自動</option>' +
      voices.map(v => `<option value="${escapeHtml(v.name)}">${escapeHtml(v.name)} (${escapeHtml(v.lang)})</option>`).join("");
    if (current && Array.from(voiceSelect.options).some(opt => opt.value === current)) {
      voiceSelect.value = current;
    }
  }

  function setupSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      micBtn.disabled = true;
      micBtn.textContent = "🎤 このブラウザでは不可";
      return;
    }

    recognition = new SR();
    recognition.lang = "en-US";
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = () => {
      recognizing = true;
      micBtn.textContent = "■ 停止";
      sendMessageText.textContent = "聞き取り中… 英語を話してください。";
    };

    recognition.onresult = (event) => {
      let finalText = "";
      let interimText = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) finalText += transcript + " ";
        else interimText += transcript + " ";
      }
      const current = userMessageInput.value.trim();
      const merged = (current + " " + finalText + interimText).trim();
      userMessageInput.value = merged;
    };

    recognition.onerror = (event) => {
      sendMessageText.textContent = "マイク入力に失敗しました: " + (event.error || "unknown");
    };

    recognition.onend = () => {
      recognizing = false;
      micBtn.textContent = "🎤 マイク入力";
      if (!sendMessageText.textContent.includes("失敗")) {
        sendMessageText.textContent = "マイク入力が終わりました。必要なら文を直して送信してください。";
      }
    };
  }

  function toggleMic() {
    if (!recognition) return;
    if (recognizing) {
      recognition.stop();
      return;
    }
    recognition.start();
  }

  async function startConversation() {
    const topic = topicInput.value.trim();
    const roleMode = roleModeSelect.value;
    const level = levelSelect.value;

    if (!topic) {
      startMessage.textContent = "テーマを入力してください。";
      return;
    }

    setLoading(true);
    startMessage.textContent = "会話を作成中…";
    sendMessageText.textContent = "";
    clearFeedback();
    summaryText.textContent = "まだありません。";

    try {
      const data = await postApi({
        action: "start",
        topic,
        roleMode,
        level
      });

      conversationHistory = Array.isArray(data.history) ? data.history : [];
      conversationStarted = true;
      sessionStats = { streak: 0, turnCount: 1 };
      renderChat();
      updateProgress();
      lastAssistantText = getLastAssistantText();
      userMessageInput.value = "";
      startMessage.textContent = "会話を始めました。";
      if (autoSpeakCheck.checked) speakText(lastAssistantText);
      saveSession();
      userMessageInput.focus();
    } catch (e) {
      conversationStarted = false;
      conversationHistory = [];
      renderChat();
      startMessage.textContent = "開始に失敗しました。\n" + e.message;
    } finally {
      setLoading(false);
    }
  }

  async function sendMessage() {
    const topic = topicInput.value.trim();
    const roleMode = roleModeSelect.value;
    const level = levelSelect.value;
    const userMessage = userMessageInput.value.trim();

    if (!conversationStarted) {
      sendMessageText.textContent = "先に「会話を始める」を押してください。";
      return;
    }

    if (!userMessage) {
      sendMessageText.textContent = "英語を入力してください。";
      return;
    }

    setLoading(true);
    sendMessageText.textContent = "送信中…";

    try {
      const data = await postApi({
        action: "reply",
        topic,
        roleMode,
        level,
        userMessage,
        history: conversationHistory
      });

      conversationHistory = Array.isArray(data.history) ? data.history : conversationHistory;
      renderChat();

      betterText.textContent = data.betterExpression || "取得できませんでした。";
      alternativeText.textContent = data.alternativeExpression || "取得できませんでした。";
      translationText.textContent = data.translationJa || "取得できませんでした。";
      reasonText.textContent = data.reasonJa || "取得できませんでした。";
      coachComment.textContent = data.coachComment || "取得できませんでした。";
      scoreText.textContent = typeof data.score === "number" ? String(data.score) : "--";
      cefrText.textContent = data.cefrLevel || "--";
      setFocusPoints(data.focusPoints || []);

      lastAssistantText = getLastAssistantText();
      sessionStats.streak += 1;
      sessionStats.turnCount += 1;
      updateProgress();

      userMessageInput.value = "";
      sendMessageText.textContent = "送信しました。";

      if (autoSpeakCheck.checked) speakText(lastAssistantText);
      saveSession();
      userMessageInput.focus();
    } catch (e) {
      sendMessageText.textContent = "送信に失敗しました。\n" + e.message;
    } finally {
      setLoading(false);
    }
  }

  async function nextScene() {
    const currentTopic = topicInput.value.trim();
    if (!currentTopic) {
      startMessage.textContent = "先にテーマを入れてください。";
      return;
    }
    topicInput.value = currentTopic + " - next situation";
    await startConversation();
  }

  function makeSummary() {
    if (!conversationHistory.length) {
      summaryText.textContent = "まだ会話がありません。";
      return;
    }

    const lastUser = [...conversationHistory].reverse().find(item => item.role === "user");
    const score = scoreText.textContent || "--";
    const cefr = cefrText.textContent || "--";
    const summary = [
      `今日のテーマ: ${topicInput.value.trim() || "(なし)"}`,
      `会話回数: ${Math.max(sessionStats.turnCount - 1, 0)}回`,
      `今回のスコア: ${score}`,
      `CEFR目安: ${cefr}`,
      `最後の自分の文: ${lastUser ? lastUser.content : "まだありません"}`,
      `次に意識すること: ${coachComment.textContent}`
    ].join("\n");

    summaryText.textContent = summary;
    saveSession();
  }

  async function copyText(text) {
    try {
      await navigator.clipboard.writeText(String(text || ""));
      sendMessageText.textContent = "コピーしました。";
    } catch {
      sendMessageText.textContent = "コピーできませんでした。";
    }
  }

  scenarioSelect.addEventListener("change", applyScenario);
  startBtn.addEventListener("click", startConversation);
  continueBtn.addEventListener("click", () => {
    const ok = loadSession();
    startMessage.textContent = ok ? "前回の会話を復元しました。" : "保存された会話がありません。";
  });
  nextBtn.addEventListener("click", nextScene);
  summaryBtn.addEventListener("click", makeSummary);
  resetBtn.addEventListener("click", () => {
    if (confirm("保存した会話も含めてリセットしますか？")) {
      resetSession();
      startMessage.textContent = "会話をリセットしました。";
    }
  });
  sendBtn.addEventListener("click", sendMessage);
  micBtn.addEventListener("click", toggleMic);
  readUserBtn.addEventListener("click", () => speakText(userMessageInput.value));
  readBetterBtn.addEventListener("click", () => speakText(betterText.textContent));
  readAltBtn.addEventListener("click", () => speakText(alternativeText.textContent));
  copyBetterBtn.addEventListener("click", () => copyText(betterText.textContent));
  copyAltBtn.addEventListener("click", () => copyText(alternativeText.textContent));

  userMessageInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading) sendMessage();
    }
  });

  saveHistoryCheck.addEventListener("change", () => {
    if (!saveHistoryCheck.checked) {
      localStorage.removeItem(STORAGE_KEY);
      startMessage.textContent = "ブラウザ保存をオフにしました。";
    } else {
      saveSession();
      startMessage.textContent = "ブラウザ保存をオンにしました。";
    }
  });

  if ("speechSynthesis" in window) {
    populateVoices();
    window.speechSynthesis.onvoiceschanged = populateVoices;
  }
  setupSpeechRecognition();
  updateProgress();
  applyScenario();
  loadSession();
</script>
</body>
</html>
