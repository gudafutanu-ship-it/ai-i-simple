<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI×I</title>

<style>
body{font-family:sans-serif;background:#f5f7fb;margin:0;padding:10px;}
.container{max-width:600px;margin:auto;}
.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;}
h1{text-align:center;margin:10px 0;}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#4f46e5;color:#fff;font-size:16px;}
textarea,input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-bottom:8px;font-size:16px;}

.chat{background:#fafafa;border-radius:10px;padding:10px;min-height:120px;max-height:150px;overflow:auto;}
.listen{position:absolute;right:10px;bottom:10px;width:40px;height:40px;border-radius:50%;background:#eef2ff;}

.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
</style>
</head>

<body>
<div class="container">

<h1>AI×I</h1>

<div class="card">
<input id="pass" placeholder="Passcode">

<select id="preset">
<option>喫茶店で / Coffee shop</option>
<option>レストランで / Restaurant</option>
<option>学校で / School</option>
<option>旅行で / Travel</option>
<option>買い物で / Shopping</option>
<option>病院で / Hospital</option>
</select>

<input id="topic" placeholder="自由入力 / Custom topic">

<button onclick="start()">Start</button>
</div>

<div class="card" style="position:relative">
<div id="chat" class="chat">ここに表示</div>
<button class="listen" onclick="speak()">🔈</button>
</div>

<div class="card">
<textarea id="msg"></textarea>

<div class="row">
<button onclick="mic()">🎤</button>
<button onclick="send()">Send</button>
<button onclick="clearAll()">Clear</button>
</div>
</div>

<div class="card">
<div id="better">Better English here</div>
</div>

</div>

<script>
const API="https://ai-i-worker.gudafutanu.workers.dev";

let history=[];
let started=false;

function getTopic(){
return document.getElementById("topic").value.trim() || document.getElementById("preset").value;
}

function render(){
if(!history.length){chat.innerText="...";return;}
let last=history.slice(-2).map(x=>x.role==="assistant"?"AI: "+x.content:"You: "+x.content);
chat.innerText=last.join("\n\n");
}

async function start(){
let pass=pass.value;
let topic=getTopic();

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"start",topic,passcode:pass})
});

let d=await res.json();
history=d.history||[];
started=true;
render();
}

async function send(){
if(!started)return;

let text=msg.value;
let pass=pass.value;
let topic=getTopic();

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"reply",
topic,
userMessage:text,
history,
passcode:pass
})
});

let d=await res.json();

history=d.history||history;
render();

better.innerText=d.betterExpression||"";

msg.value="";
}

function clearAll(){
history=[];
started=false;
chat.innerText="cleared";
better.innerText="";
}

function speak(){
let last=[...history].reverse().find(x=>x.role==="assistant");
if(!last)return;

let u=new SpeechSynthesisUtterance(last.content);
u.lang="en-US";
speechSynthesis.speak(u);
}

function mic(){
let r=new(window.SpeechRecognition||webkitSpeechRecognition)();
r.lang="en-US";
r.onresult=e=>{
msg.value=e.results[0][0].transcript;
};
r.start();
}
</script>

</body>
</html>
