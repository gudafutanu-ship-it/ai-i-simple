<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI×I</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 11px;
      border-radius: 9px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      color: #555;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .chat-box {
      white-space: pre-wrap;
      line-height: 1.8;
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      min-height: 160px;
      max-height: 420px;
      overflow-y: auto;
    }

    .result-block {
      white-space: pre-wrap;
      line-height: 1.7;
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      min-height: 60px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">

  <h1>AI×I</h1>
  <div class="subtitle">対話型・シンプル英会話アプリ</div>

  <div class="card">
    <div class="section-title">設定</div>

    <label class="label">パスコード</label>
    <input
      id="passcodeInput"
      type="password"
      placeholder="配布されたパスコードを入力"
      autocomplete="off"
      autocapitalize="off"
      autocorrect="off"
      spellcheck="false"
    >

    <label class="label">テーマ</label>
    <input id="topicInput" type="text" placeholder="例：baseball" value="baseball">

    <div class="row">
      <div>
        <label class="label">会話の形</label>
        <select id="roleModeSelect">
          <option value="ai_asks" selected>AIが質問して私が答える</option>
          <option value="user_asks">私が質問してAIが答える</option>
        </select>
      </div>

      <div>
        <label class="label">英語レベル</label>
        <select id="levelSelect">
          <option value="Oxford1000">Oxford1000</option>
          <option value="Oxford2000" selected>Oxford2000</option>
          <option value="Oxford3000">Oxford3000</option>
        </select>
      </div>
    </div>

    <div class="small">
      例：baseball / travel / school / restaurant
    </div>

    <button id="startBtn">会話を始める</button>
    <div id="startMessage" class="message"></div>
  </div>

  <div class="card">
    <div class="section-title">会話</div>
    <div id="chatBox" class="chat-box">ここに会話が表示されます。</div>
  </div>

  <div class="card">
    <div class="section-title">あなたの入力</div>
    <textarea id="userMessageInput" placeholder="ここに英語を書いて送信します。"></textarea>
    <button id="sendBtn" disabled>送信する</button>
    <div class="small">Enterで送信 / Shift+Enterで改行</div>
    <div id="sendMessageText" class="message"></div>
  </div>

  <div class="card">
    <div class="section-title">もっと自然な英語</div>
    <div id="betterText" class="result-block">ここに表示されます。</div>
  </div>

  <div class="card">
    <div class="section-title">別の言い方</div>
    <div id="alternativeText" class="result-block">ここに表示されます。</div>
  </div>

  <div class="card">
    <div class="section-title">理由（日本語）</div>
    <div id="reasonText" class="result-block">ここに表示されます。</div>
  </div>

</div>

<script>
  const API_URL = "https://ai-i-worker.gudafutanu.workers.dev";

  let conversationHistory = [];
  let conversationStarted = false;
  let isLoading = false;

  const passcodeInput = document.getElementById("passcodeInput");
  const topicInput = document.getElementById("topicInput");
  const roleModeSelect = document.getElementById("roleModeSelect");
  const levelSelect = document.getElementById("levelSelect");
  const startBtn = document.getElementById("startBtn");
  const sendBtn = document.getElementById("sendBtn");
  const startMessage = document.getElementById("startMessage");
  const sendMessageText = document.getElementById("sendMessageText");
  const userMessageInput = document.getElementById("userMessageInput");
  const chatBox = document.getElementById("chatBox");

  async function postApi(payload) {
    const passcode = passcodeInput.value.trim();

    if (!passcode) {
      throw new Error("パスコードを入力してください");
    }

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        ...payload,
        passcode
      })
    });

    let data = {};
    try {
      data = await res.json();
    } catch {
      throw new Error("サーバーから正しいJSONが返りませんでした。");
    }

    if (!res.ok) {
      throw new Error(data.detail || data.error || "通信エラーです");
    }

    return data;
  }

  function renderChat() {
    if (!conversationHistory.length) {
      chatBox.textContent = "ここに会話が表示されます。";
      return;
    }

    const lines = conversationHistory.map(item => {
      if (item.role === "assistant") return "AI: " + item.content;
      if (item.role === "user") return "You: " + item.content;
      return item.content;
    });

    chatBox.textContent = lines.join("\n\n");
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function clearFeedback() {
    document.getElementById("betterText").textContent = "ここに表示されます。";
    document.getElementById("alternativeText").textContent = "ここに表示されます。";
    document.getElementById("reasonText").textContent = "ここに表示されます。";
  }

  function setLoading(loading) {
    isLoading = loading;
    startBtn.disabled = loading;
    sendBtn.disabled = loading || !conversationStarted;
  }

  async function startConversation() {
    const topic = topicInput.value.trim();
    const roleMode = roleModeSelect.value;
    const level = levelSelect.value;

    if (!topic) {
      startMessage.textContent = "テーマを入力してください。";
      return;
    }

    setLoading(true);
    startMessage.textContent = "会話を作成中…";
    sendMessageText.textContent = "";
    clearFeedback();

    try {
      const data = await postApi({
        action: "start",
        topic,
        roleMode,
        level
      });

      conversationHistory = Array.isArray(data.history) ? data.history : [];
      conversationStarted = true;
      renderChat();

      userMessageInput.value = "";
      startMessage.textContent = "会話を始めました。";
      sendBtn.disabled = false;
      userMessageInput.focus();
    } catch (e) {
      conversationStarted = false;
      conversationHistory = [];
      renderChat();
      startMessage.textContent = "開始に失敗しました。\n" + e.message;
    } finally {
      setLoading(false);
    }
  }

  async function sendMessage() {
    const topic = topicInput.value.trim();
    const roleMode = roleModeSelect.value;
    const level = levelSelect.value;
    const userMessage = userMessageInput.value.trim();

    if (!conversationStarted) {
      sendMessageText.textContent = "先に「会話を始める」を押してください。";
      return;
    }

    if (!userMessage) {
      sendMessageText.textContent = "英語を入力してください。";
      return;
    }

    setLoading(true);
    sendMessageText.textContent = "送信中…";

    try {
      const data = await postApi({
        action: "reply",
        topic,
        roleMode,
        level,
        userMessage,
        history: conversationHistory
      });

      conversationHistory = Array.isArray(data.history) ? data.history : conversationHistory;
      renderChat();

      document.getElementById("betterText").textContent =
        data.betterExpression || "取得できませんでした。";

      document.getElementById("alternativeText").textContent =
        data.alternativeExpression || "取得できませんでした。";

      document.getElementById("reasonText").textContent =
        data.reasonJa || "取得できませんでした。";

      userMessageInput.value = "";
      sendMessageText.textContent = "送信しました。";
      userMessageInput.focus();
    } catch (e) {
      sendMessageText.textContent = "送信に失敗しました。\n" + e.message;
    } finally {
      setLoading(false);
    }
  }

  startBtn.addEventListener("click", startConversation);
  sendBtn.addEventListener("click", sendMessage);

  userMessageInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading) {
        sendMessage();
      }
    }
  });
</script>
</body>
</html>
