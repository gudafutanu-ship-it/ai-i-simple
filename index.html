<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI×I</title>

  <!-- PWA -->

  <link rel="manifest" href="manifest.json?v=6">

  <!-- ★ iPhone対策（最重要） -->

  <link rel="apple-touch-icon" href="icon-new-192.png?v=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- ★ キャッシュ完全無効化 -->

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    body {
      font-family: "Yu Gothic", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f6f8;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
    }

    input, button, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
    }

    #result {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>

</head>

<body>

<div class="box">
  <h2>AI×I</h2>

  <input id="pass" placeholder="パスコード">
  <input id="theme" placeholder="テーマ（例: baseball）">

<button onclick="start()">会話を始める</button>

  <div id="result"></div>
</div>

<script>
async function start() {
  const pass = document.getElementById("pass").value;
  const theme = document.getElementById("theme").value;

  const res = await fetch("https://あなたのWorkerURL", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "start",
      passcode: pass,
      theme: theme
    })
  });

  const data = await res.json();
  document.getElementById("result").innerText =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
