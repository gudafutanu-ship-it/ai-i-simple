<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI×I</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 11px;
      border-radius: 9px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .result-block {
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .message {
      color: #555;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="container">

  <h1>AI×I</h1>
  <div class="subtitle">シンプル版・壊れにくい英会話アプリ</div>

  <div class="card">
    <div class="section-title">入力</div>

    <label class="label">パスコード</label>
    <input
      id="passcodeInput"
      type="password"
      placeholder="配布されたパスコードを入力"
      autocomplete="off"
      autocapitalize="off"
      autocorrect="off"
      spellcheck="false"
    >

    <label class="label">テーマ（1語でOK）</label>
    <input id="topicInput" type="text" placeholder="例：baseball" value="baseball">

    <label class="label">モード</label>
    <select id="modeSelect">
      <option value="easy">やさしい</option>
      <option value="normal" selected>ふつう</option>
      <option value="fun">もりあがる</option>
    </select>

    <div class="small">
      例：baseball / restaurant / school / travel
    </div>

    <button onclick="startConversation()">会話を作る</button>
    <div id="startMessage" class="message"></div>
  </div>

  <div class="card">
    <div class="section-title">会話</div>
    <div id="conversationText" class="result-block">ここに会話が表示されます。</div>
  </div>

  <div class="card">
    <div class="section-title">もっと自然な英語</div>
    <div id="betterText" class="result-block">ここに表示されます。</div>
  </div>

  <div class="card">
    <div class="section-title">別の言い方</div>
    <div id="alternativeText" class="result-block">ここに表示されます。</div>
  </div>

  <div class="card">
    <div class="section-title">理由（日本語）</div>
    <div id="reasonText" class="result-block">ここに表示されます。</div>
  </div>

</div>

<script>
  // ★ここをあなたのWorker URLに書き換える
  const API_URL = "https://ai-i-worker.gudafutanu.workers.dev";

  async function postApi(payload) {
    const passcode = document.getElementById("passcodeInput").value.trim();

    if (!passcode) {
      throw new Error("パスコードを入力してください");
    }

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        ...payload,
        passcode
      })
    });

    let data = {};
    try {
      data = await res.json();
    } catch {
      throw new Error("サーバーから正しいJSONが返りませんでした。");
    }

    if (!res.ok) {
      throw new Error(data.error || data.detail || "通信エラーです");
    }

    return data;
  }

  async function startConversation() {
    const topic = document.getElementById("topicInput").value.trim();
    const mode = document.getElementById("modeSelect").value;
    const startMessage = document.getElementById("startMessage");

    if (!topic) {
      startMessage.textContent = "テーマを入力してください。";
      return;
    }

    startMessage.textContent = "作成中…";

    try {
      const data = await postApi({
        topic,
        mode
      });

      document.getElementById("conversationText").textContent =
        data.conversation || "会話を取得できませんでした。";

      document.getElementById("betterText").textContent =
        data.betterExpression || "取得できませんでした。";

      document.getElementById("alternativeText").textContent =
        data.alternativeExpression || "取得できませんでした。";

      document.getElementById("reasonText").textContent =
        data.reasonJa || "取得できませんでした。";

      startMessage.textContent = "会話を作成しました。";
    } catch (e) {
      startMessage.textContent = "作成に失敗しました。\n" + e.message;
    }
  }
</script>
</body>
</html>
