<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <link rel="apple-touch-icon" href="icon-new-192.png">
<link rel="icon" href="icon-new-192.png">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI×I</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:10px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:15px;
  margin-bottom:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#4f46e5;
  color:#fff;
  font-size:16px;
}

.row{
  display:flex;
  gap:6px;
}

textarea{
  width:100%;
  height:80px;
  border-radius:10px;
}

.line{
  background:#eee;
  padding:12px;
  border-radius:12px;
  position:relative;
}

.speaker{
  position:absolute;
  right:10px;
  bottom:10px;
}

.good{
  background:#d1fae5;
}

</style>
</head>

<body>

<h2 style="text-align:center;">AI×I</h2>

<div class="card">
<input id="passcodeInput" placeholder="passcode">

<select id="topicPresetSelect">
<option value="coffee shop">喫茶店</option>
<option value="restaurant">レストラン</option>
<option value="school">学校</option>
<option value="travel">旅行</option>
<option value="shopping">買い物</option>
<option value="hospital">病院</option>
</select>

<input id="topicInput" placeholder="自由入力">

<button id="startBtn">Start</button>
<div id="startMessage"></div>
</div>

<div class="card">

<div class="line">
<div>What you hear</div>
<div id="aiLineText"></div>
<button id="speakAiBtn" class="speaker">📣</button>
</div>

<div class="line good">
<div>Ideal reply</div>
<div id="idealReplyText"></div>
<button id="speakIdealBtn" class="speaker">📣</button>
</div>

</div>

<div class="card">

<textarea id="readTargetBox"></textarea>

<div class="row">
<button id="micBtn">🎤</button>
<button id="retryBtn">Retry</button>
<button id="clearBtn">Clear</button>
</div>

<button id="nextBtn">Next</button>

<div id="recognizedText"></div>

</div>

<div class="card">
<div id="scoreBox">-</div>
</div>

<script>

const API_URL = "https://ai-i-worker.gudafutanu.workers.dev";

// ⭐ ここが今回のコア
let usedAiLines = [];

let currentScene = null;
let recognition = null;

const passcodeInput = document.getElementById("passcodeInput");
const topicPresetSelect = document.getElementById("topicPresetSelect");
const topicInput = document.getElementById("topicInput");

const aiLineText = document.getElementById("aiLineText");
const idealReplyText = document.getElementById("idealReplyText");

const readTargetBox = document.getElementById("readTargetBox");
const recognizedText = document.getElementById("recognizedText");

const scoreBox = document.getElementById("scoreBox");

function getTopic(){
  return topicInput.value || topicPresetSelect.value;
}

async function postApi(data){
  const res = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      ...data,
      passcode:passcodeInput.value
    })
  });

  return res.json();
}

async function startScene(){

  const topic = getTopic();

  const data = await postApi({
    action:"generate_scene",
    topic,
    lastAiLines:usedAiLines   // ⭐ここ重要
  });

  currentScene = data;

  aiLineText.textContent = data.aiLine;
  idealReplyText.textContent = data.idealReply;

  readTargetBox.value = data.idealReply;

  // ⭐履歴保存（最大5件）
  if(data.aiLine){
    usedAiLines.push(data.aiLine);
    if(usedAiLines.length > 5){
      usedAiLines.shift();
    }
  }

}

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  speechSynthesis.speak(u);
}

document.getElementById("startBtn").onclick = startScene;
document.getElementById("nextBtn").onclick = startScene;

document.getElementById("speakAiBtn").onclick = () => speak(aiLineText.textContent);
document.getElementById("speakIdealBtn").onclick = () => speak(idealReplyText.textContent);

document.getElementById("clearBtn").onclick = () => {
  usedAiLines = [];   // ⭐完全リセット
  aiLineText.textContent = "";
  idealReplyText.textContent = "";
  readTargetBox.value = "";
  recognizedText.textContent = "";
  scoreBox.textContent = "-";
};

document.getElementById("retryBtn").onclick = () => {
  recognizedText.textContent = "";
  scoreBox.textContent = "-";
};

// ===== 音声認識 =====
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SR){
  recognition = new SR();
  recognition.lang = "en-US";

  recognition.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    recognizedText.textContent = text;

    const target = readTargetBox.value;

    let score = 0;
    if(text.toLowerCase() === target.toLowerCase()){
      score = 100;
    } else {
      score = 70;
    }

    scoreBox.textContent = score;
  };
}

document.getElementById("micBtn").onclick = ()=>{
  recognition && recognition.start();
};

</script>

</body>
</html>
